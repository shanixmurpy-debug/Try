<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSmart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="rectangle-shape">
        <h1 id="myH1">Welcome</h1>
        <form id="myForm" action="action_page.php" method="GET">

            <br><br>
            <div class="form-row">
                <label for="myText">Username:</label>
                <input id="myText" type="text" name="uname" placeholder="Username" required>
            </div>

            <div class="form-row">
                <label for="password">Password:</label>
                <input id="password" type="password" name="pass" maxlength="12" placeholder="Password" required>
            </div>

            <div class="form-row">
                <label for="email">Email:</label>
                <input id="email" type="email" name="email" placeholder="Example@gmail.com" required>
            </div>

            <br><br>

            <button type="reset">Reset</button>
            <button id="mySubmit" type="submit">Submit</button>
        </form>

        <br>
        <a href="Sign up.html">Sign up</a>
    </div>

    <div id="greeting" style="display: none; text-align: center; font-size: 2em; margin-top: 50px;"></div>

    <script src="index.js"></script>
</body>
</html>
